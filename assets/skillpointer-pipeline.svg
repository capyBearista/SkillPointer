<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="1000" height="650">
  <defs>
    <style>
      .text-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 32px; font-weight: 800; fill: #38bdf8; letter-spacing: 1px; }
      .text-subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 500; fill: #94a3b8; }
      .text-phase { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #cbd5e1; letter-spacing: 2px; }
      .text-dialogue { font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif; font-size: 14px; fill: #f8fafc; }
      .text-dialogue-em { font-weight: bold; fill: #38bdf8; }
      .text-dialogue-warn { font-weight: bold; fill: #ef4444; }
      
      .stroke-main { stroke: #cbd5e1; stroke-width: 3px; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .stroke-heavy { stroke: #94a3b8; stroke-width: 6px; stroke-linecap: round; }
      .fill-main { fill: #0f172a; stroke: #38bdf8; stroke-width: 2px; }
      .fill-accent { fill: #38bdf8; }
      .fill-glow { fill: #38bdf8; filter: drop-shadow(0 0 8px #38bdf8); }
      .fill-glow-green { fill: #4ade80; filter: drop-shadow(0 0 8px #4ade80); }
      
      .bg-panel { fill: #1e293b; rx: 12px; }
      
      /* Conveyor belt dashed line animation */
      .conveyor-belt { stroke: #475569; stroke-width: 8px; stroke-dasharray: 20 10; animation: moveBelt 3s linear infinite; }
      
      /* Fun Animations */
      .float { animation: float 4s ease-in-out infinite; }
      .pulse { animation: pulse 2s infinite; }
      .type-anim { width: 0; animation: type 4s steps(30, end) infinite; overflow: hidden; white-space: nowrap; }
      .move-box { animation: moveBox 8s linear infinite; }
      .gears { transform-origin: center; animation: spin 4s linear infinite; }
      .gears-reverse { transform-origin: center; animation: spinReverse 4s linear infinite; }
      .look-around { transform-origin: 50% 50%; animation: look 6s ease-in-out infinite; }
      .arm-wave { transform-origin: bottom; animation: wave 3s ease-in-out infinite; }
      
      @keyframes moveBelt { to { stroke-dashoffset: -60; } }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
      @keyframes pulse { 0%, 100% { opacity: 0.8; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.05); } }
      @keyframes type { 0% { width: 0; } 50% { width: 100%; } 100% { width: 100%; } }
      @keyframes moveBox { 0% { transform: translateX(-100px); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateX(900px); opacity: 0; } }
      @keyframes spin { 100% { transform: rotate(360deg); } }
      @keyframes spinReverse { 100% { transform: rotate(-360deg); } }
      @keyframes look { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-15deg); } 75% { transform: rotate(15deg); } }
      @keyframes wave { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(30deg); } }
    </style>
    
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>

  <!-- Canvas -->
  <rect width="1000" height="650" fill="url(#bgGradient)" rx="16" />

  <!-- Header -->
  <text x="500" y="50" class="text-title" text-anchor="middle">The SkillPointer AI Pipeline</text>
  <text x="500" y="75" class="text-subtitle" text-anchor="middle">How OpenCode accesses 2,000+ skills instantly, without destroying your token limits.</text>

  <!-- ==========================================
       PHASE 1: THE PROMPT
       ========================================== -->
  <text x="50" y="140" class="text-phase">1. INITIAL PROMPT</text>
  <line x1="50" y1="150" x2="950" y2="150" stroke="#334155" stroke-width="2" />
  
  <g transform="translate(100, 170)">
    <!-- User (Stick figure) -->
    <circle cx="30" cy="20" r="15" class="stroke-main" /> <!-- Head -->
    <line x1="30" y1="35" x2="30" y2="70" class="stroke-main" /> <!-- Body -->
    <path d="M 10 50 Q 30 40 50 45" class="stroke-main" /> <!-- Arms typing -->
    <path d="M 15 100 L 30 70 L 40 100" class="stroke-main" /> <!-- Legs sitting -->
    
    <!-- Chair -->
    <path d="M 5 65 L 20 65 L 20 90 L 20 100" stroke="#475569" stroke-width="4" fill="none" />
    
    <!-- Desk & Computer -->
    <line x1="45" y1="60" x2="90" y2="60" class="stroke-heavy" /> <!-- Desk -->
    <line x1="65" y1="60" x2="65" y2="100" class="stroke-heavy" /> <!-- Leg -->
    <rect x="55" y="30" width="10" height="25" fill="#334155" transform="rotate(-15 55 30)" /> <!-- Monitor -->
    
    <!-- Speech Bubble -->
    <path d="M 25 -5 Q 10 -20 30 -35 L 200 -35 Q 220 -35 220 -20 L 220 10 Q 220 25 200 25 L 50 25 Z" class="fill-main" />
    <text x="125" y="-5" class="text-dialogue" text-anchor="middle">"Hey AI! Build a secure REST API"</text>
  </g>

  <!-- The Heavy Prompt Box moving -->
  <g class="move-box" transform="translate(0, 160)">
    <rect x="300" y="0" width="120" height="80" rx="8" class="fill-main" />
    <text x="360" y="35" class="text-dialogue text-dialogue-warn" text-anchor="middle">Heavy Task</text>
    <text x="360" y="60" class="text-dialogue" text-anchor="middle" font-size="12px">0 Context Loaded</text>
    <!-- Little wheels -->
    <circle cx="320" cy="85" r="8" fill="#475569" class="gears" />
    <circle cx="400" cy="85" r="8" fill="#475569" class="gears" />
  </g>

  <!-- Standard Conveyor Belt -->
  <line x1="100" y1="250" x2="900" y2="250" class="conveyor-belt" />

  <!-- ==========================================
       PHASE 2: THE POINTER SCAN
       ========================================== -->
  <text x="50" y="330" class="text-phase">2. THE POINTER SCAN (Index Card)</text>
  <line x1="50" y1="340" x2="950" y2="340" stroke="#334155" stroke-width="2" />

  <g transform="translate(450, 360)">
    <!-- Robot (Square Head AI) -->
    <rect x="20" y="10" width="30" height="25" rx="4" class="stroke-main" /> <!-- Head -->
    <line x1="35" y1="0" x2="35" y2="10" class="stroke-main" /> <!-- Antenna -->
    <circle cx="35" cy="-2" r="3" class="fill-accent pulse" /> <!-- Antenna light -->
    <!-- Eyes -->
    <g class="look-around" style="transform-origin: 35px 22px;">
      <circle cx="28" cy="22" r="2" fill="#38bdf8" />
      <circle cx="42" cy="22" r="2" fill="#38bdf8" />
    </g>
    <line x1="35" y1="35" x2="35" y2="70" class="stroke-main" /> <!-- Body -->
    
    <!-- Arm holding the pointer card -->
    <path d="M 35 45 Q 10 40 5 60" class="stroke-main" />
    <!-- Arm pointing -->
    <path d="M 35 45 Q 50 40 70 30" class="stroke-main arm-wave" style="transform-origin: 35px 45px;" />
    
    <path d="M 20 100 L 35 70 L 50 100" class="stroke-main" /> <!-- Legs -->

    <!-- Tiny Pointer Card -->
    <rect x="-15" y="55" width="25" height="30" fill="#f8fafc" stroke="#94a3b8" stroke-width="1" transform="rotate(-15 -5 60)" />
    <line x1="-12" y1="65" x2="0" y2="62" stroke="#ef4444" stroke-width="2" transform="rotate(-15 -5 60)" />
    <line x1="-10" y1="72" x2="5" y2="69" stroke="#94a3b8" stroke-width="1" transform="rotate(-15 -5 60)" />
    <line x1="-8" y1="78" x2="2" y2="76" stroke="#94a3b8" stroke-width="1" transform="rotate(-15 -5 60)" />

    <!-- Speech Bubble -->
    <path d="M 35 -15 Q 45 -30 60 -35 L 350 -35 Q 370 -35 370 -20 L 370 15 Q 370 30 350 30 L 60 30 Z" class="fill-main" />
    <text x="215" y="-5" class="text-dialogue" text-anchor="middle">"Ah! The <tspan class="text-dialogue-em">backend-pointer</tspan> says I shouldn't guess.</text>
    <text x="215" y="15" class="text-dialogue" text-anchor="middle">The Map says: Go to the <tspan class="text-dialogue-em">Hidden Vault</tspan>!"</text>
  </g>

  <!-- ==========================================
       PHASE 3: THE VAULT HEIST & EXECUTION
       ========================================== -->
  <text x="50" y="500" class="text-phase">3. VAULT EXTRACTION &amp; EXECUTION</text>
  <line x1="50" y1="510" x2="950" y2="510" stroke="#334155" stroke-width="2" />

  <!-- The Underground Vault -->
  <g transform="translate(100, 530)">
    <rect x="0" y="0" width="280" height="90" class="bg-panel" stroke="#475569" stroke-width="3" stroke-dasharray="5 5" />
    <text x="140" y="30" class="text-dialogue text-dialogue-em" text-anchor="middle">~/.opencode-skill-libraries/</text>
    
    <!-- Rows of unlit folders -->
    <rect x="20" y="50" width="15" height="20" fill="#334155" />
    <rect x="40" y="50" width="15" height="20" fill="#334155" />
    <rect x="60" y="50" width="15" height="20" fill="#334155" />
    <rect x="80" y="50" width="15" height="20" fill="#334155" />
    <rect x="240" y="50" width="15" height="20" fill="#334155" />
    <text x="170" y="65" class="text-dialogue" font-size="12px">...2,000 more...</text>
    
    <!-- The ONE glowing folder being extracted -->
    <rect x="100" y="45" width="20" height="25" class="fill-glow pulse" stroke="#fff" stroke-width="1" />
    <polyline points="110,40 110,15 150,15" stroke="#38bdf8" stroke-width="2" fill="none" stroke-dasharray="4" />
    
    <text x="210" y="20" class="text-dialogue" font-size="10px">Grab 1 Folder!</text>
  </g>

  <!-- AI Generating Code -->
  <g transform="translate(500, 520)">
    <!-- Robot (Square Head AI) running -->
    <rect x="20" y="10" width="30" height="25" rx="4" class="stroke-main" /> <!-- Head -->
    <path d="M 35 15 L 45 15" stroke="#38bdf8" stroke-width="2" /> <!-- Sunglasses cool AI -->
    <line x1="35" y1="35" x2="45" y2="65" class="stroke-main" /> <!-- Body leaning forward -->
    <!-- Arms -->
    <path d="M 40 45 Q 60 40 70 55" class="stroke-main" /> 
    <!-- Legs running -->
    <path d="M 45 65 L 30 90" class="stroke-main" /> 
    <path d="M 45 65 L 65 90" class="stroke-main" /> 

    <!-- Holding the glowing folder -->
    <rect x="65" y="45" width="15" height="20" class="fill-glow" />

    <!-- Code Production Machine -->
    <rect x="130" y="10" width="100" height="85" class="fill-main" />
    <text x="180" y="30" class="text-dialogue" text-anchor="middle" font-size="12px">LLM ENGINE</text>
    <!-- Gears inside -->
    <circle cx="160" cy="60" r="10" fill="#475569" class="gears" />
    <circle cx="190" cy="55" r="15" fill="#334155" class="gears-reverse" />
    
    <!-- Beautiful Code dropping out -->
    <rect x="260" y="20" width="70" height="70" class="fill-glow-green float" />
    <line x1="265" y1="35" x2="310" y2="35" stroke="#0f172a" stroke-width="4" />
    <line x1="265" y1="50" x2="320" y2="50" stroke="#0f172a" stroke-width="4" />
    <line x1="265" y1="65" x2="290" y2="65" stroke="#0f172a" stroke-width="4" />
    <text x="295" y="105" class="text-dialogue text-dialogue-em float" text-anchor="middle">PERFECT CODE!</text>

    <!-- Arrow from AI to Machine to Code -->
    <path d="M 90 55 L 120 55" stroke="#38bdf8" stroke-width="3" fill="none" class="dash-anim" />
    <polygon points="115,50 125,55 115,60" fill="#38bdf8" />

    <path d="M 235 55 L 250 55" stroke="#4ade80" stroke-width="3" fill="none" class="dash-anim" />
    <polygon points="245,50 255,55 245,60" fill="#4ade80" />
  </g>
  
</svg>
